name: Python Integration Tests

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt  
          pip install pytest
          
      - name: Run Tests
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          CHROMA_PATH: ./test_chroma_db
        run: |
          # Create the environment file with the single arrow (overwrites)
          echo "CHROMA_PATH=./test_chroma_db" > backend/.env.test
          
          # Add the database URL with double arrows (appends)
          echo "DATABASE_URL=sqlite:///./test_app.db" >> backend/.env.test
          
          pytest tests/test_rag_pipeline.py -v