name: Python Integration Tests

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r backend/requirements.txt
        pip install pytest
        
    - name: Run Tests
      # Injecting variables natively here guarantees Python will find them
      env:
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        CHROMA_PATH: ./test_chroma_db
        DATABASE_URL: sqlite:///./test_app.db
        JWT_SECRET_KEY: f75bce74ad732d64c6bb90067d5c6c10b2243a327e37f60eb3370e265058d23a
        SECRET_KEY: f75bce74ad732d64c6bb90067d5c6c10b2243a327e37f60eb3370e265058d23a
        FLASK_ENV: testing
        FLASK_APP: backend/main.py
      run: |
        # No more echo commands needed! 
        pytest tests/test_rag_pipeline.py -v